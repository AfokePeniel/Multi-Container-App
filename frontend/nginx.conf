server {
    listen 80;

    # Serve the React build output
    location / {
        root /usr/share/nginx/html;
        # Enables React client-side routing — falls back to index.html on 404
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api requests to the backend container
    # "node_backend" is resolved by Docker/Podman DNS on the shared network
    location /api/ {
        proxy_pass http://node_backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
