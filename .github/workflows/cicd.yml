name: CI/CD Pipeline

# Triggers only on pushes to main (after dev and staging have been tested)
on:
  push:
    branches:
      - main

jobs:

  # ── JOB 1: BUILD AND PUSH IMAGES TO DOCKER HUB ──────────────
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Log in to Docker Hub using GitHub Secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3 — Set up Docker Buildx for advanced image building
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4 — Build and push the backend image to Docker Hub
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/multi-container-backend:latest

      # Step 5 — Build and push the frontend image to Docker Hub
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/multi-container-frontend:latest

  # ── JOB 2: DEPLOY ─────────────────────────────────────────────
  # Runs only after build-and-push completes successfully
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # Step 1 — Pull the latest images from Docker Hub and redeploy the stack
      - name: Pull latest images and redeploy
        run: |
          docker pull afokepeniel/multi-container-backend:latest
          docker pull afokepeniel/multi-container-frontend:latest
          docker compose up -d