version: '3.9'

# ── Multi-Container App: React + Node.js + PostgreSQL ──────────
# Run with: docker compose up -d --build
# Stop with: docker compose down
# Nuke volumes: docker compose down -v

services:

  # ── Database ──────────────────────────────────────────────────
  db:
    image: postgres:16
    container_name: pg_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: appdb
    volumes:
      # Named volume — persists data across container restarts and rebuilds
      - pg_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend (Node.js/Express) ─────────────────────────────────
  backend:
    image: afokepeniel/multi-container-backend:latest    # pulls from Docker Hub in production
    build: ./backend
    container_name: node_backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_USER: appuser
      DB_PASSWORD: apppassword
      DB_NAME: appdb
      PORT: 5000
    depends_on:
      db:
        condition: service_healthy   # waits for postgres healthcheck to pass
    networks:
      - app_network

  # ── Frontend (React + Nginx) ──────────────────────────────────
  frontend:
    image: afokepeniel/multi-container-frontend:latest   # pulls from Docker Hub in production
    build: ./frontend
    container_name: react_frontend
    restart: unless-stopped
    ports:
      # Only the frontend is exposed to the host — backend and DB are internal only
      - "3001:80"
    depends_on:
      - backend
    networks:
      - app_network

# ── Shared Network ────────────────────────────────────────────
# All containers join this network — they find each other by container_name
networks:
  app_network:
    driver: bridge

# ── Named Volumes ─────────────────────────────────────────────
volumes:
  pg_data: